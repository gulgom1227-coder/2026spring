<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Voice to VSQX - Colab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-gray-800 p-8 rounded-2xl border border-gray-700 shadow-2xl">
        <h1 class="text-2xl font-bold mb-2 text-blue-400">범용 음성 VSQX 추출기</h1>
        <p class="text-gray-500 text-sm mb-6">Colab Backend 기반</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1 font-bold">BPM (입력 필수)</label>
                <input type="number" id="bpm" value="120" class="w-full bg-gray-700 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div class="relative border-2 border-dashed border-gray-600 p-10 rounded-xl text-center hover:bg-gray-700 transition">
                <input type="file" id="videoFile" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <p id="fileName" class="text-gray-300">영상을 여기로 드래그하거나 클릭</p>
            </div>

            <button onclick="upload()" id="btn" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 shadow-lg active:scale-95 transition">추출 및 다운로드</button>
            
            <div id="status" class="hidden">
                <div class="flex justify-center mb-2"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-400"></div></div>
                <p class="text-center text-sm text-blue-400 animate-pulse">AI가 영상의 음정과 가사를 분석 중입니다...</p>
            </div>
        </div>
    </div>

    <script>
        // ★ 코랩에서 생성된 "접속 주소"를 여기에 붙여넣으세요 ★
        const API_URL = "https://disfigure-pasta-waggle.ngrok-free.dev";

        const fileInput = document.getElementById('videoFile');
        fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('fileName').innerText = fileInput.files[0].name; };

        async function upload() {
            const file = fileInput.files[0];
            if(!file) return alert("분석할 파일을 선택해 주세요.");
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('bpm', document.getElementById('bpm').value);

            document.getElementById('status').classList.remove('hidden');
            document.getElementById('btn').classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/convert`, { method: 'POST', body: formData });
                if(!res.ok) throw new Error("서버 오류");

                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `voice_to_vsqx_${Date.now()}.vsqx`;
                a.click();
            } catch (e) {
                alert("연결 실패! 주소가 맞는지, 혹은 코랩 서버가 실행 중인지 확인하세요.");
            } finally {
                document.getElementById('status').classList.add('hidden');
                document.getElementById('btn').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
